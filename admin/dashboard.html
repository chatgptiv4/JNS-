<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard | JNS express delivery</title>
    <link rel="stylesheet" href="../static/assets/css/bootstrap.min.d5a0532d55f3.css">
    <link rel="stylesheet" href="../static/assets/lib/font-awesome-pro/css/fontawesome.min.7d3db9a481ee.css">
    <link rel="stylesheet" href="../static/assets/css/common-style.ce230ada3bee.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --jns-orange: #FF8C00;
            --bg-dark: #0b0b0c;
            --sidebar-width: 260px;
        }
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Sidebar Styles */
        .sidebar { 
            background: var(--bg-dark); 
            min-height: 100vh; 
            color: white; 
            padding: 30px 20px;
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            z-index: 1050;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .main-content { 
            margin-left: var(--sidebar-width);
            padding: 40px; 
            transition: all 0.3s;
            min-height: 100vh;
            width: calc(100% - var(--sidebar-width));
        }
        
        /* Mobile Navigation */
        .mobile-nav {
            display: none;
            background: var(--bg-dark);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1001;
            justify-content: space-between;
            align-items: center;
        }
        .mobile-nav .logo-text { font-size: 20px; font-weight: 700; color: white; text-decoration: none; }
        .mobile-nav .logo-text span { color: var(--jns-orange); }
        .menu-toggle { background: transparent; border: none; color: white; font-size: 24px; cursor: pointer; }

        .nav-link { 
            color: rgba(255,255,255,0.7) !important; 
            padding: 12px 15px; 
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active { 
            background: rgba(255,255,255,0.1); 
            color: white !important; 
        }
        .nav-link.active { border-left: 4px solid var(--jns-orange); }

        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border-radius: 12px; }
        .btn-jns { background: var(--jns-orange); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; }
        .btn-jns:hover { background: #e67e00; color: white; }
        
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-hold { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .status-active { background: #f0fff4; color: #22543d; border: 1px solid #9ae6b4; }

        /* Responsive Adjustments */
        @media (max-width: 991px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
                left: 0;
                top: 0;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 20px; width: 100%; }
            .mobile-nav { display: flex; }
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .overlay.active { display: block; }
            
            .table-responsive { border: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .page-header { flex-direction: column; align-items: flex-start !important; gap: 15px; }
            .btn-jns { width: 100%; }

            /* Mobile Card-style Table */
            .table thead { display: none; }
            .table tbody tr { 
                display: block; 
                margin-bottom: 15px; 
                border: 1px solid #eee; 
                border-radius: 10px; 
                padding: 10px;
                background: #fff;
            }
            .table tbody td { 
                display: flex; 
                justify-content: space-between; 
                align-items: center; 
                padding: 10px 5px; 
                border: none;
                text-align: right;
            }
            .table tbody td:before {
                content: attr(data-label);
                font-weight: 700;
                text-align: left;
                text-transform: uppercase;
                font-size: 11px;
                color: #718096;
            }
            .table tbody td.text-end { text-align: right; justify-content: flex-end; }
            .table tbody td.text-end:before { display: none; }
        }

        /* Table Optimization */
        .table thead th { 
            background: #f8f9fa; 
            border-top: none; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #718096;
            padding: 15px;
        }
        .table tbody td { padding: 20px 15px; vertical-align: middle; }
        .action-btns { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="overlay" id="sidebarOverlay"></div>
    
    <div class="mobile-nav">
        <a href="../index.html" class="logo-text">JNS<span>delivery</span></a>
        <button class="menu-toggle" id="sidebarToggle">☰</button>
    </div>

    <div class="container-fluid p-0">
        <div class="d-flex">
            <div class="sidebar" id="sidebar">
                <div class="d-none d-lg-block mb-5">
                    <a href="../index.html" style="font-size: 24px; font-weight: 700; color: #fff; text-decoration: none;">JNS<span style="color: #FF8C00;">delivery</span></a>
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#"><i class="fas fa-box"></i> Packages</a>
                    <a class="nav-link" href="#"><i class="fas fa-chart-line"></i> Analytics</a>
                    <a class="nav-link" href="#"><i class="fas fa-cog"></i> Settings</a>
                    <a class="nav-link mt-auto text-danger" href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </nav>
            </div>
            
            <div class="main-content flex-grow-1">
                <div class="d-flex justify-content-between align-items-center mb-5 page-header">
                    <div>
                        <h2 class="fw-bold mb-1">Package Management</h2>
                        <p class="text-muted small mb-0">Manage and track all customer shipments</p>
                    </div>
                    <button class="btn btn-jns" data-bs-toggle="modal" data-bs-target="#addPackageModal">
                        + New Tracking Code
                    </button>
                </div>

                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>Code</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                        <th>Last Update</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="package-list">
                                    <!-- Data populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Package Modal -->
    <div class="modal fade" id="addPackageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title fw-bold">New Shipment</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="add-package-form">
                    <div class="modal-body p-4">
                        <div class="mb-4">
                            <label class="form-label fw-600">Destination City</label>
                            <input type="text" id="loc-name" class="form-control form-control-lg" placeholder="e.g. London, UK" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label fw-600">Latitude</label>
                                <input type="number" step="any" id="loc-lat" class="form-control" value="0" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-600">Longitude</label>
                                <input type="number" step="any" id="loc-lng" class="form-control" value="0" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-600">Status Update</label>
                            <input type="text" id="pkg-status" class="form-control" value="In Transit" required>
                        </div>
                        <p class="text-muted small mt-2">A unique 12-character JNS code will be generated automatically.</p>
                    </div>
                    <div class="modal-footer border-0 p-4 pt-0">
                        <button type="submit" class="btn btn-jns w-100 py-3">Create Shipment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { TrackingDB } from '../static/assets/js/tracking/db.js';

        // Mobile Sidebar Logic
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        }

        sidebarToggle.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // Security Check
        if (sessionStorage.getItem('jns_admin_auth') !== 'true' || Date.now() > parseInt(sessionStorage.getItem('jns_admin_expiry'))) {
            const currentPath = window.location.pathname;
            if (currentPath.includes('/admin/dashboard')) {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'admin/index.html';
            }
        }

        async function renderPackages() {
            const list = document.getElementById('package-list');
            const packages = await TrackingDB.getAll();
            list.innerHTML = packages.map(pkg => `
                <tr>
                    <td data-label="Code">
                        <div class="fw-bold">${pkg.code}</div>
                        <div class="text-muted d-lg-none" style="font-size: 11px;">${pkg.lat}, ${pkg.lng}</div>
                    </td>
                    <td data-label="Location">
                        <div>${pkg.locationName}</div>
                        <div class="text-muted small d-none d-lg-block">${pkg.lat}, ${pkg.lng}</div>
                    </td>
                    <td data-label="Status">
                        <span class="status-badge ${pkg.onHold ? 'status-hold' : 'status-active'}">
                            ${pkg.onHold ? 'ON HOLD' : pkg.status}
                        </span>
                    </td>
                    <td data-label="Update" class="small text-muted">${new Date(pkg.updatedAt).toLocaleDateString()}</td>
                    <td class="text-end">
                        <div class="action-btns justify-content-end">
                            <button class="btn btn-sm btn-outline-secondary toggle-hold" data-code="${pkg.code}" title="${pkg.onHold ? 'Release' : 'Hold'}">
                                <i class="fas ${pkg.onHold ? 'fa-play' : 'fa-pause'}"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger delete-pkg" data-code="${pkg.code}" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('add-package-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPkg = {
                code: TrackingDB.generateCode(),
                locationName: document.getElementById('loc-name').value,
                lat: parseFloat(document.getElementById('loc-lat').value),
                lng: parseFloat(document.getElementById('loc-lng').value),
                status: document.getElementById('pkg-status').value,
                onHold: false
            };
            await TrackingDB.save(newPkg);
            renderPackages();
            bootstrap.Modal.getInstance(document.getElementById('addPackageModal')).hide();
        });

        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('toggle-hold')) {
                const code = e.target.dataset.code;
                const pkg = await TrackingDB.getByCode(code);
                pkg.onHold = !pkg.onHold;
                await TrackingDB.save(pkg);
                renderPackages();
            }
            if (e.target.classList.contains('delete-pkg')) {
                if(confirm('Are you sure?')) {
                    await TrackingDB.delete(e.target.dataset.code);
                    renderPackages();
                }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.clear();
            const currentPath = window.location.pathname;
            if (currentPath.includes('/admin/dashboard')) {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'admin/index.html';
            }
        });

        (async () => {
            await TrackingDB.init();
            renderPackages();
        })();
    </script>
</body>
</html>

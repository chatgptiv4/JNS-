<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard | JNS express delivery</title>
    <link rel="stylesheet" href="../static/assets/css/bootstrap.min.d5a0532d55f3.css">
    <link rel="stylesheet" href="../static/assets/css/common-style.ce230ada3bee.css">
    <style>
        body { background: #f4f7f6; }
        .sidebar { background: var(--bg-dark); min-height: 100vh; color: white; padding: 20px; }
        .main-content { padding: 40px; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .btn-jns { background: #FF8C00; color: white; border: none; }
        .btn-jns:hover { background: #e67e00; color: white; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .status-hold { background: #ff4d4d; color: white; }
        .status-active { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <h4 class="mb-5">JNS Admin</h4>
                <nav class="nav flex-column">
                    <a class="nav-link text-white active" href="#">Packages</a>
                    <a class="nav-link text-white mt-5" href="#" id="logout-btn">Logout</a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h2>Package Management</h2>
                    <button class="btn btn-jns" data-bs-toggle="modal" data-bs-target="#addPackageModal">
                        + Generate New Tracking Code
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Tracking Code</th>
                                    <th>Location</th>
                                    <th>Coordinates</th>
                                    <th>Status</th>
                                    <th>Last Update</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="package-list">
                                <!-- Data populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Package Modal -->
    <div class="modal fade" id="addPackageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">New Package Wizard</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="add-package-form">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Location Name</label>
                            <input type="text" id="loc-name" class="form-control" placeholder="e.g. London, UK" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Latitude</label>
                                <input type="number" step="any" id="loc-lat" class="form-control" value="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Longitude</label>
                                <input type="number" step="any" id="loc-lng" class="form-control" value="0" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status Message</label>
                            <input type="text" id="pkg-status" class="form-control" value="In Transit" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-jns">Generate & Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { TrackingDB } from '../static/assets/js/tracking/db.js';

        // Security Check
        if (sessionStorage.getItem('jns_admin_auth') !== 'true' || Date.now() > parseInt(sessionStorage.getItem('jns_admin_expiry'))) {
            const currentPath = window.location.pathname;
            if (currentPath.includes('/admin/dashboard')) {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'admin/index.html';
            }
        }

        async function renderPackages() {
            const list = document.getElementById('package-list');
            const packages = await TrackingDB.getAll();
            list.innerHTML = packages.map(pkg => `
                <tr>
                    <td><strong>${pkg.code}</strong></td>
                    <td>${pkg.locationName}</td>
                    <td>${pkg.lat}, ${pkg.lng}</td>
                    <td>
                        <span class="status-badge ${pkg.onHold ? 'status-hold' : 'status-active'}">
                            ${pkg.onHold ? 'ON HOLD' : pkg.status}
                        </span>
                    </td>
                    <td>${new Date(pkg.updatedAt).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger toggle-hold" data-code="${pkg.code}">
                            ${pkg.onHold ? 'Release' : 'Place on Hold'}
                        </button>
                        <button class="btn btn-sm btn-outline-secondary delete-pkg" data-code="${pkg.code}">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('add-package-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPkg = {
                code: TrackingDB.generateCode(),
                locationName: document.getElementById('loc-name').value,
                lat: parseFloat(document.getElementById('loc-lat').value),
                lng: parseFloat(document.getElementById('loc-lng').value),
                status: document.getElementById('pkg-status').value,
                onHold: false
            };
            await TrackingDB.save(newPkg);
            renderPackages();
            bootstrap.Modal.getInstance(document.getElementById('addPackageModal')).hide();
        });

        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('toggle-hold')) {
                const code = e.target.dataset.code;
                const pkg = await TrackingDB.getByCode(code);
                pkg.onHold = !pkg.onHold;
                await TrackingDB.save(pkg);
                renderPackages();
            }
            if (e.target.classList.contains('delete-pkg')) {
                if(confirm('Are you sure?')) {
                    await TrackingDB.delete(e.target.dataset.code);
                    renderPackages();
                }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.clear();
            const currentPath = window.location.pathname;
            if (currentPath.includes('/admin/dashboard')) {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'admin/index.html';
            }
        });

        (async () => {
            await TrackingDB.init();
            renderPackages();
        })();
    </script>
</body>
</html>
